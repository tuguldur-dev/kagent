# `schema` points at the migration files, so `sqlc generate` validates every
# query against the schema those migrations produce. This is a load-bearing
# migration-safety gate: a migration that drops/renames/retypes a column
# a current query uses makes codegen fail, and the manifests-check CI job catches
# the resulting drift. Do not "fix" such a failure by deleting the query — it is
# reporting a real schema/query incompatibility. The previous-release direction
# (old queries vs the new schema = the windowed-contraction invariant) is checked
# by scripts/check-query-contraction.sh.
version: "2"
sql:
  - schema: ["../../pkg/migrations/core", "../../pkg/migrations/vector"]
    queries: "queries"
    engine: "postgresql"
    gen:
      go:
        package: "dbgen"
        out: "gen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          # pgx/v5 native mode maps all timestamptz → pgtype.Timestamptz by default.
          # Override to keep idiomatic time.Time / *time.Time throughout.
          - db_type: "timestamptz"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          # Use domain types for columns that would otherwise be plain strings/bytes.
          - column: "agent.config"
            go_type:
              import: "github.com/kagent-dev/kagent/go/api/adk"
              type: "AgentConfig"
              pointer: true
          - column: "feedback.issue_type"
            go_type:
              import: "github.com/kagent-dev/kagent/go/api/database"
              type: "FeedbackIssueType"
              pointer: true
          - column: "memory.embedding"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
